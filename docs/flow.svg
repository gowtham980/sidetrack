<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" role="img" aria-label="sidetrack how it works">
  <title>sidetrack — How it works</title>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .title { font: 700 22px ui-sans-serif, system-ui, sans-serif; fill: #e5e7eb; }
      .sub { font: 400 13px ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; }
      .label { font: 600 14px ui-sans-serif, system-ui, sans-serif; fill: #e5e7eb; }
      .small { font: 400 12px ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; }
      .edge { stroke: #94a3b8; stroke-width: 1.8; fill: none; }
      .input { fill: #1d4ed8; stroke: #93c5fd; stroke-width: 1; }
      .process { fill: #4338ca; stroke: #a5b4fc; stroke-width: 1; }
      .storage { fill: #0f766e; stroke: #5eead4; stroke-width: 1; }
      .external { fill: #92400e; stroke: #fcd34d; stroke-width: 1; }
      .risk { fill: #991b1b; stroke: #fca5a5; stroke-width: 1; }
      .neutral { fill: #334155; stroke: #94a3b8; stroke-width: 1; }
      .zone { fill: none; stroke: #64748b; stroke-width: 1.2; stroke-dasharray: 6 5; }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1000" height="720" rx="18"/>

  <text x="36" y="44" class="title">sidetrack — How it works</text>
  <text x="36" y="68" class="sub">Local-first git worktree manager: add · go · list · status · rm · cleanup</text>

  <!-- flow connectors -->
  <path class="edge" marker-end="url(#a)" d="M190 150 H240"/>
  <path class="edge" marker-end="url(#a)" d="M410 150 H460"/>
  <path class="edge" marker-end="url(#a)" d="M630 150 H680"/>
  <path class="edge" marker-end="url(#a)" d="M540 210 V250"/>

  <text x="36" y="105" class="label">Command path</text>

  <rect class="input" x="40" y="120" width="150" height="60" rx="12"/>
  <text x="115" y="145" text-anchor="middle" class="label">You</text>
  <text x="115" y="165" text-anchor="middle" class="small">sidetrack add fix/x</text>

  <rect class="process" x="240" y="120" width="170" height="60" rx="12"/>
  <text x="325" y="145" text-anchor="middle" class="label">CLI</text>
  <text x="325" y="165" text-anchor="middle" class="small">parse · resolve</text>

  <rect class="process" x="460" y="120" width="170" height="60" rx="12"/>
  <text x="545" y="145" text-anchor="middle" class="label">gitops</text>
  <text x="545" y="165" text-anchor="middle" class="small">path · branch · safety</text>

  <rect class="external" x="680" y="120" width="170" height="60" rx="12"/>
  <text x="765" y="145" text-anchor="middle" class="label">git worktree</text>
  <text x="765" y="165" text-anchor="middle" class="small">add / list / remove</text>

  <rect class="storage" x="300" y="250" width="400" height="54" rx="12"/>
  <text x="500" y="282" text-anchor="middle" class="label">~/code/app-worktrees/<branch></text>

  <!-- layout -->
  <text x="36" y="350" class="label">Default filesystem layout</text>
  <rect class="zone" x="40" y="370" width="420" height="150" rx="14"/>
  <text x="60" y="398" class="small">Main checkout</text>
  <rect class="input" x="70" y="420" width="360" height="70" rx="12"/>
  <text x="250" y="450" text-anchor="middle" class="label">~/code/myapp</text>
  <text x="250" y="470" text-anchor="middle" class="small">stays clean · no stash thrash</text>

  <rect class="zone" x="520" y="370" width="440" height="150" rx="14"/>
  <text x="540" y="398" class="small">Sidecar worktrees</text>
  <rect class="storage" x="550" y="420" width="180" height="50" rx="10"/>
  <text x="640" y="450" text-anchor="middle" class="label">feature-x</text>
  <rect class="storage" x="750" y="420" width="180" height="50" rx="10"/>
  <text x="840" y="450" text-anchor="middle" class="label">fix-login</text>
  <path class="edge" marker-end="url(#a)" d="M460 445 H520"/>

  <!-- lifecycle -->
  <text x="36" y="570" class="label">Weekly lifecycle</text>
  <path class="edge" marker-end="url(#a)" d="M175 640 H210"/>
  <path class="edge" marker-end="url(#a)" d="M355 640 H390"/>
  <path class="edge" marker-end="url(#a)" d="M535 640 H570"/>
  <path class="edge" marker-end="url(#a)" d="M715 640 H750"/>

  <rect class="input" x="40" y="600" width="135" height="70" rx="12"/>
  <text x="107" y="630" text-anchor="middle" class="label">Mid-feature</text>
  <text x="107" y="650" text-anchor="middle" class="small">main tree</text>

  <rect class="process" x="210" y="600" width="145" height="70" rx="12"/>
  <text x="282" y="630" text-anchor="middle" class="label">add + go</text>
  <text x="282" y="650" text-anchor="middle" class="small">hotfix / PR</text>

  <rect class="storage" x="390" y="600" width="145" height="70" rx="12"/>
  <text x="462" y="630" text-anchor="middle" class="label">Isolated</text>
  <text x="462" y="650" text-anchor="middle" class="small">no stash</text>

  <rect class="external" x="570" y="600" width="145" height="70" rx="12"/>
  <text x="642" y="630" text-anchor="middle" class="label">Ship</text>
  <text x="642" y="650" text-anchor="middle" class="small">merge / push</text>

  <rect class="risk" x="750" y="600" width="180" height="70" rx="12"/>
  <text x="840" y="630" text-anchor="middle" class="label">rm / cleanup</text>
  <text x="840" y="650" text-anchor="middle" class="small">drop merged</text>
</svg>
